<!doctype html>
<html lang="bn">
<head>
<meta charset="utf-8" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;600;700;800&family=Poppins:wght@500;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1280px; height:720px; overflow:hidden; }
  body {
    font-family:'Noto Sans Bengali','Poppins',sans-serif;
    background:radial-gradient(1200px 700px at 50% -10%, #14532d 0%, #052e16 55%, #021509 100%);
    color:#fff; display:flex; align-items:center; justify-content:center; position:relative;
  }
  .glow { position:absolute; border-radius:50%; filter:blur(90px); opacity:.4; }
  .g1 { width:520px;height:520px; background:#15803d; top:-160px; left:-120px; }
  .g2 { width:480px;height:480px; background:#b91c1c; bottom:-180px; right:-120px; opacity:.30;}
  .card { position:relative; text-align:center; z-index:2; padding:0 60px; }
  .flags { display:flex; gap:26px; justify-content:center; align-items:center; margin-bottom:34px; }
  .flag { width:96px; height:64px; border-radius:8px; box-shadow:0 10px 30px rgba(0,0,0,.45); position:relative; overflow:hidden; border:2px solid rgba(255,255,255,.25);}
  /* Pakistan */
  .pk { background:#01411C; }
  .pk .stripe { position:absolute; left:0; top:0; bottom:0; width:24px; background:#fff; }
  .pk .crescent { position:absolute; right:18px; top:14px; width:34px; height:34px; border-radius:50%; background:#fff; }
  .pk .crescent::after { content:''; position:absolute; top:3px; left:9px; width:28px; height:28px; border-radius:50%; background:#01411C; }
  .pk .star { position:absolute; right:14px; top:16px; color:#fff; font-size:16px; }
  /* Bangladesh */
  .bd { background:#006a4e; display:flex; align-items:center; justify-content:center; }
  .bd .dot { width:36px; height:36px; border-radius:50%; background:#f42a41; margin-left:-8px; }
  .heart { font-size:30px; }
  .kicker { font-family:'Poppins'; letter-spacing:.42em; text-transform:uppercase; font-size:16px; color:#86efac; margin-bottom:22px; }
  h1 { font-size:96px; font-weight:800; line-height:1.15; text-shadow:0 8px 30px rgba(0,0,0,.4); }
  .en { font-family:'Poppins'; font-size:34px; font-weight:600; color:#bbf7d0; margin-top:14px; }
  .sub { font-size:30px; font-weight:600; margin-top:30px; color:#fef9c3; }
  .brand { position:absolute; bottom:34px; left:0; right:0; text-align:center; font-family:'Poppins'; font-size:18px; color:rgba(255,255,255,.55); letter-spacing:.08em; z-index:2;}
  .brand b { color:#fde68a; }
</style>
</head>
<body>
  <div class="glow g1"></div><div class="glow g2"></div>
  <div class="card">
    <div class="flags">
      <div class="flag pk"><div class="stripe"></div><div class="crescent"></div><div class="star">★</div></div>
      <span class="heart">🤝</span>
      <div class="flag bd"><div class="dot"></div></div>
    </div>
    <div class="kicker">Pakistan &nbsp;•&nbsp; Bangladesh</div>
    <h1>পাকিস্তানে স্বাগতম</h1>
    <div class="en">Welcome to Pakistan</div>
    <div class="sub">বাংলাদেশের সম্মানিত প্রতিনিধি দলকে আন্তরিক শুভেচ্ছা</div>
  </div>
  <div class="brand">Presented by <b>AdMotion</b> &nbsp;·&nbsp; Alberuni Tech &nbsp;·&nbsp; NUML</div>
</body>
</html>
