<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="AdMotion Vehicle Display App - Digital advertising for vehicles" />
    <title>AdMotion Vehicle</title>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1e40af" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AdMotion" />
    <meta name="application-name" content="AdMotion Vehicle" />
    <meta name="msapplication-TileColor" content="#1e40af" />
    <meta name="msapplication-tap-highlight" content="no" />
    
    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192x192.png" />
    
    <!-- Splash Screen Meta -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    
    <!-- TV Box / Android TV optimizations -->
    <meta name="format-detection" content="telephone=no" />
    <meta name="screen-orientation" content="landscape" />
    
    <!-- Prevent zoom on TV -->
    <meta name="HandheldFriendly" content="true" />
    
    <!-- Preconnect to Firebase -->
    <link rel="preconnect" href="https://firestore.googleapis.com" />
    <link rel="preconnect" href="https://firebasestorage.googleapis.com" />
    
    <!-- DNS prefetch -->
    <link rel="dns-prefetch" href="https://firestore.googleapis.com" />
    <link rel="dns-prefetch" href="https://firebasestorage.googleapis.com" />
  </head>
  <body class="overflow-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
          try {
            const registration = await navigator.serviceWorker.register('/sw.js', {
              scope: '/'
            });
            console.log('✅ Service Worker registered:', registration.scope);
            
            // Handle SW updates
            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              console.log('🔄 New Service Worker found');
              
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  console.log('🆕 New version available, refreshing...');
                  // Auto-update for TV boxes
                  newWorker.postMessage({ action: 'skipWaiting' });
                  setTimeout(() => window.location.reload(), 1000);
                }
              });
            });
            
            // Request periodic background sync for location
            if ('periodicSync' in registration) {
              try {
                await registration.periodicSync.register('location-sync', {
                  minInterval: 60 * 1000 // 1 minute
                });
                console.log('✅ Periodic location sync registered');
              } catch (error) {
                console.log('⚠️ Periodic sync not supported');
              }
            }
          } catch (error) {
            console.error('❌ Service Worker registration failed:', error);
          }
        });
        
        // Listen for messages from SW
        navigator.serviceWorker.addEventListener('message', (event) => {
          console.log('💬 Message from SW:', event.data);
          
          if (event.data.action === 'reload') {
            window.location.reload();
          }
          
          if (event.data.action === 'syncLocation') {
            // Trigger location update
            window.dispatchEvent(new CustomEvent('sw-location-sync'));
          }
          
          if (event.data.action === 'syncHeartbeat') {
            // Trigger heartbeat
            window.dispatchEvent(new CustomEvent('sw-heartbeat-sync'));
          }
        });
      }
      
      // Keep screen awake (for TV boxes)
      async function keepScreenAwake() {
        if ('wakeLock' in navigator) {
          try {
            const wakeLock = await navigator.wakeLock.request('screen');
            console.log('✅ Screen Wake Lock activated');
            
            document.addEventListener('visibilitychange', async () => {
              if (document.visibilityState === 'visible') {
                await navigator.wakeLock.request('screen');
              }
            });
          } catch (error) {
            console.log('⚠️ Wake Lock not supported:', error);
          }
        }
      }
      keepScreenAwake();
      
      // Prevent context menu on TV
      document.addEventListener('contextmenu', (e) => e.preventDefault());
      
      // Handle install prompt
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        window.deferredPrompt = deferredPrompt;
        console.log('📱 PWA install prompt available');
      });
    </script>
  </body>
</html>
