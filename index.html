<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>AdMotion - Vehicle Advertising Platform</title>
    <meta name="description" content="Intelligent Vehicle Advertising Ecosystem" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0B1452" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AdMotion" />

    <!-- Android TV / Kiosk hints -->
    <meta name="full-screen" content="yes" />
    <meta name="browsermode" content="application" />

    <!-- Icons -->
    <link rel="icon" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Prevent sleep on display devices -->
    <style>
      /* Loading screen while JS loads */
      #app-loader {
        position: fixed; inset: 0; z-index: 99999;
        background: #030712;
        display: flex; align-items: center; justify-content: center;
        flex-direction: column; gap: 16px;
      }
      #app-loader .spinner {
        width: 40px; height: 40px;
        border: 3px solid rgba(251,191,36,0.2);
        border-top-color: #f59e0b;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      #app-loader .text { color: rgba(255,255,255,0.3); font-size: 12px; font-family: system-ui; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body class="bg-slate-100 dark:bg-slate-950 transition-colors duration-300">
    <!-- Loading screen (hidden once React mounts) -->
    <div id="app-loader">
      <div class="spinner"></div>
      <div class="text">Loading AdMotion...</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
    <script>
      // Instant redirect ONLY for PWA standalone mode (home screen launch)
      // Never triggers in a normal browser tab
      (function() {
        var isStandalone = window.matchMedia('(display-mode: standalone)').matches
          || window.navigator.standalone === true;
        var isDisplay = localStorage.getItem('display_vehicle_id');
        var path = window.location.pathname;
        if (isStandalone && isDisplay && (path === '/' || path === '/index.html')) {
          window.location.replace('/display/play');
        }
      })();
      // Remove loader once app is ready
      window.addEventListener('load', function() {
        var loader = document.getElementById('app-loader');
        if (loader) setTimeout(function() { loader.remove(); }, 500);
      });
    </script>
  </body>
</html>
